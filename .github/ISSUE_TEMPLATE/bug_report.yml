name: Bug report
description: Report a defect in Planwise
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below so we can reproduce and fix the issue quickly.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am running a supported Planwise version (`pw --version`).
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps. Include commands, inputs, and any relevant files.
      placeholder: |
        1. Run `pw init ...`
        2. Run `pw ...`
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include full error output, stack traces, and logs. Redact any secrets or PII.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Coding agent
      options:
        - Claude Code
        - Cursor
        - Codex
        - Other / not applicable
    validations:
      required: true

  - type: input
    id: pw-version
    attributes:
      label: Planwise version
      description: Output of `pw --version`.
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.5, Ubuntu 24.04, Windows 11 (WSL2)"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related issues, workarounds, or anything else that might help.
